spring.application.name=FoodoraProject1
#database connecting.
spring.datasource.url=jdbc:mysql://localhost:3306/FoodoraBackend1
spring.datasource.username=root
spring.datasource.password=root
#mentioning the driver is important to say spring to connect which database(mysql,or other)
#com.mysql.cj.jdbc \u2192 package name
#Driver \u2192 the actual MySQL JDBC driver class

spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

#Data Definition Language(eg :create table , delete table)
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show.sql=true
#it says the hibernate which sql dialect to use when comm to database . this indicates this db version 8 and create query according to it.
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQL8Dialect


spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

server.port=8081

